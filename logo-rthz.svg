<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
    <style>
        .bg-canvas { fill: #060913; } /* Cor de fundo do site para manter o contraste do vidro */
    </style>
    <!-- Fundo opcional para contraste, pode remover se quiser fundo transparente -->
    <rect width="100" height="100" class="bg-canvas" rx="20"/>
    
    <defs>
        <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00d2ff" />
            <stop offset="100%" stop-color="#0052ff" />
        </linearGradient>
        <linearGradient id="glassBorder" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03" />
        </linearGradient>
        <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <polygon points="50,22 78,70 22,70" fill="#002575" opacity="0.4" transform="translate(0, 3)" />
    <polygon points="50,22 78,70 22,70" fill="url(#coreGrad)" filter="url(#neonGlow)" />
    <polygon points="50,40 66,66 34,66" fill="#060913" />
    <path d="M50,22 L78,70 L66,66 L50,40 Z" fill="#ffffff" opacity="0.15" />
    <circle cx="50" cy="53" r="42" fill="rgba(255, 255, 255, 0.01)" stroke="url(#glassBorder)" stroke-width="1.5" />
</svg>
